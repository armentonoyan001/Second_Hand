<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header>
    <nav class="nav">
        <ul class="nav_block">
            <li class="nav_list"><a href="index.html" class="nav_link">Home</a></li>
            <li class="nav_list"><a href="#" class="nav_link active">Catalog</a></li>
            <li class="nav_list"><a href="#" class="nav_link">Gender</a></li>
            <li class="nav_list"><a href="#" class="nav_link">Brands</a></li>
            <li class="nav_list"><a href="#" class="nav_link">News</a></li>
            <li class="nav_list"><a href="#" class="nav_link">About</a></li>
            <li class="nav_list"><a href="#" class="nav_link">Contact</a></li>
        </ul>
        <form class="search_form">
            <input type=search placeholder="Search" id="search">
            <button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
        <div class="cart">
            <p class="cart_p">Cart</p>
            <p class="number">3</p>
            <div class="cart_line">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </div>
    </nav>
</header>
<main>
    <section class="home">
        <div class="left_block">
            <figure class="logo_img">
                <img src="img/second-hand-removebg-preview.png" alt="logo" class="logo">
            </figure>
            <div class="home_filters"><p>filters</p>
                <figure class="home_icone">
                    <i class="fas fa-sliders-h"></i>
                </figure>
            </div>
            <div class="shop">
                <p class="shop_desc">Shop By</p>
                <div class="shop_filters">
                    <div class="dot"></div>
                    <p class="shop_text">Gender</p>
                    <i class="fa-solid fa-circle-chevron-down"></i>
                </div>
                <div class="shop_filters">
                    <div class="dot"></div>
                    <p class="shop_text">Brands</p>
                    <i class="fa-solid fa-circle-chevron-down"></i>
                </div>
                <div class="shop_filters">
                    <div class="dot"></div>
                    <p class="shop_text">Style</p>
                    <i class="fa-solid fa-circle-chevron-down"></i>
                </div>
                <div class="shop_filters">
                    <div class="dot"></div>
                    <p class="shop_text">Price</p>
                    <i class="fa-solid fa-circle-chevron-down"></i>
                </div>
                <div class="shop_filters">
                    <div class="dot"></div>
                    <p class="shop_text">Season</p>
                    <i class="fa-solid fa-circle-chevron-down"></i>
                </div>
                <div class="shop_filters">
                    <div class="dot"></div>
                    <p class="shop_text">Sales</p>
                    <i class="fa-solid fa-circle-chevron-down"></i>
                </div>
            </div>
        </div>

    <div class="catalog">
        <figure class="catalog_figure">
            <img src="img/catalog8143.logowik.com-removebg-preview.png" alt="logo" class="catalog_img">
        </figure>
        <div class="tob_block catalog_block">
            <div class="top_figure catalog_figure">
                <figure class="top_brand_img catalog_img">
                    <div class="new">Newest</div>
                    <img src="img/araji.webp" alt="img" class="top_figure_img">
                    <h1 class="cart_title">Your text here</h1>
                    <p class="cart_desc">Lorem ipsum dollar slt</p>
                    <div class="icon"><i class="fa-solid fa-chevron-right"></i></div>
                    <div class="price">
                        <p>$1 - $100</p>
                    </div>
                    <div class="dress_size">
                        <div class="col-size">S</div>
                        <div class="col-size">M</div>
                        <div class="col-size">L</div>
                    </div>
                </figure>
            </div>
        </div>
    </div>
    </section>
</main>
</body>
</html>
